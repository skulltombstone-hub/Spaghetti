name: Build Spaghetti

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Spaghetti
        uses: actions/checkout@v4
        with:
          path: Spaghetti

      - name: Checkout Butterscotch
        uses: actions/checkout@v4
        with:
          repository: skulltombstone-hub/Butterscotch
          path: Butterscotch
          fetch-depth: 0

      - name: Prepare compatible runtime
        working-directory: Butterscotch
        run: |
          git reset --hard afe0d080cd48a57f06cf92289e47a34c1023dd15
          git cherry-pick 7ececa3b3b03ca0598ea1ea49f2da961da4ed421

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build APK
        working-directory: Spaghetti
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Spaghetti-debug
          path: Spaghetti/app/build/outputs/apk/debug/*.apk
